<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Habit Tracker</title>
    <link rel="icon" type="image/x-icon" href="hamster.png">
    <link href="https://fonts.cdnfonts.com/css/aureola" rel="stylesheet">
                
</head>

                <p id="habitTitle">My New Habit</p>
                <p id="totalDays"> 0/31</p>
            </div>

            <div id="calendarContent">
                <div id="tracker">
                    <div class="days">
                        <div class="day">1 </div>
                        <div class="day">1 </div>
                        <div class="day">1 </div>
                        <div class="day">1 </div>
                        <div class="day">1 </div>
                        <div class="day">1 </div>
                        <div class="day">1 </div>
                    </div>
                    <div class="days">
                        <div class="day">1 </div>
                        <div class="day">1 </div>
                        <div class="day">1 </div>
                        <div class="day">1 </div>
                        <div class="day">1 </div>
                        <div class="day">1 </div>
                        <div class="day">1 </div>
                    </div>
                    <div class="days">
                        <div class="day">1 </div>
                        <div class="day">1 </div>
                        <div class="day">1 </div>
                        <div class="day">1 </div>
                        <div class="day">1 </div>
                        <div class="day">1 </div>
                        <div class="day">1 </div>
                    </div>
                    <div class="days">
                        <div class="day">1 </div>
                        <div class="day">1 </div>
                        <div class="day">1 </div>
                        <div class="day">1 </div>
                        <div class="day">1 </div>
                        <div class="day">1 </div>
                        <div class="day">1 </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <button id="resetButton"> Reset Button </button>
</body>
<style>
    body{
        background-image: url("disney.png");
        background-size: 650px;
        background-color: rgb(140, 182, 246);
        /* background-blend-mode: lighten; */
        text-align: center;
        font-family: 'Aureola', sans-serif;
    }

    #title{
        margin-top: 100px;
        line-height: 10px;
    }

    #subtitle{
        opacity: 0.7;
        font-size: 18px;
        margin-bottom: 20px;
    }

    #calendarContainer{
        display: flex;
    }

    #calendarDiv{
        background-color: beige;
        border-radius: 10px 10px 20px 20px;
        margin: auto;
        align-content: center;
        text-align: center;
    }

    #calendarHeading{
        display: flex;
        justify-content: space-between;
        border-radius: 10px 10px 0px 0px;
        border: 2px solid black;
        padding: 0px 20px;
        font-size: 20px;
        background-color: rgb(126, 218, 255);
        line-height: 0px;
    }

    #calendarContent{
        padding: 20px;
        border: 2px solid black;
    }
    
    .days{
        display: flex;
    }

    .day{
        width: 30px;
        margin: 3px;
        padding: 10px;
        font-size: 15px;
        text-align: center;
        border-radius: 20px;
        border: 2px solid black;
        background-color: rgb(174, 224, 255);
    }
</style>
</html>
